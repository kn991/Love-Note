# lovenote reverse proxy for littlehomie.tech
# HTTP → serves the ACME challenge and redirects everything else to HTTPS.
# HTTPS → terminates TLS and proxies / to the frontend and /api to the backend.

server {
    listen 80;
    listen [::]:80;
    server_name littlehomie.tech;

    # Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name littlehomie.tech;

    ssl_certificate     /etc/letsencrypt/live/littlehomie.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/littlehomie.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Recipient answers are tiny; keep uploads bounded.
    client_max_body_size 1m;

    # Allow renewals to keep working over HTTPS too.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API → Flask/gunicorn. Keep the /api prefix (backend routes live under /api).
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js (with websocket upgrade support).
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
