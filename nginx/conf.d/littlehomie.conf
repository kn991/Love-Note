# lovenote · origin reverse proxy for littlehomie.tech (behind Cloudflare)
#
# Cloudflare terminates the public TLS handshake and connects back to THIS
# origin. We present a self-signed certificate on :443 — Cloudflare accepts it
# in SSL/TLS mode "Full" (it does not validate the origin cert in that mode).
#
# We listen on BOTH :80 and :443 and serve the app on either, with NO
# http→https redirect. That way the stack works regardless of which Cloudflare
# SSL/TLS mode is selected (Flexible → :80, Full / Full(strict) → :443) and
# avoids the redirect loop you get when Cloudflare talks to the origin over http
# while the origin keeps bouncing it back to https.

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name littlehomie.tech;

    # Self-signed origin certificate (generated by gen-selfsigned.sh, never committed).
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Recipient answers are tiny; keep uploads bounded.
    client_max_body_size 1m;

    # Cloudflare already terminated TLS for the browser, so the app is effectively
    # serving HTTPS. Force the scheme so secure cookies / generated links are https.
    # API → Flask/gunicorn. Keep the /api prefix (backend routes live under /api).
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Everything else → Next.js (with websocket upgrade support).
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
