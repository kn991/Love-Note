# ── lovenote · PRODUCTION stack for littlehomie.tech (behind Cloudflare) ────
# Cloudflare terminates the public TLS handshake and proxies to this origin.
# nginx presents a self-signed cert on :443 (accepted by Cloudflare "Full" mode)
# and also serves :80, so it works in any Cloudflare SSL/TLS mode.
#
#   cp .env.prod.example .env           # fill in DB password + 3 secrets
#   sh nginx/gen-selfsigned.sh          # first time only: make the origin cert
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Then in the Cloudflare dashboard: SSL/TLS → Overview → set encryption mode
# to "Full", and make sure the DNS A record for littlehomie.tech is proxied
# (orange cloud). Open ports 80 and 443 in the server's firewall.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lovenote}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lovenote}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lovenote}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_CONFIG: production
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      HASH_SALT: ${HASH_SALT:?set HASH_SALT in .env}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-lovenote}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lovenote}
      REDIS_URL: redis://redis:6379/0
      # The app sits behind nginx on a single domain, so cookies stay same-site.
      CORS_ORIGINS: https://littlehomie.tech
      APP_PUBLIC_URL: https://littlehomie.tech
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: Lax
      # nginx is one trusted hop; it sets X-Forwarded-Proto=https (Cloudflare is
      # in front of nginx but only nginx talks to the backend directly).
      PROXY_FIX_HOPS: "1"
    expose:
      - "5000"            # internal only — never published to the host
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the browser bundle at build time → must be the public HTTPS URL.
        NEXT_PUBLIC_API_BASE_URL: https://littlehomie.tech/api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"            # internal only

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
